version: "3.9"

services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - chroma_data:/app/chroma_data
    depends_on:
      - chromadb

  # ── ChromaDB (optional remote mode) ───────────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.5.3
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  # ── Frontend (Vite dev server) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend

volumes:
  chroma_data:
